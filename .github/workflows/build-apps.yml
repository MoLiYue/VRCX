name: Build Apps

on:
    workflow_dispatch:
        inputs:
            version:
                description: Optional version override. Defaults to the Version file.
                required: false
                type: string
    push:
        tags:
            - 'v*'

concurrency:
    group: build-apps-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    DOTNET_NOLOGO: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
    version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            installer_version: ${{ steps.version.outputs.installer_version }}
        steps:
            - uses: actions/checkout@v6
            - id: version
              shell: bash
              run: |
                  VERSION="${{ inputs.version }}"
                  if [ -z "$VERSION" ]; then
                      VERSION="$(cat Version)"
                  fi
                  echo "$VERSION" > Version
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "installer_version=${VERSION}.0" >> "$GITHUB_OUTPUT"

    build-windows:
        name: Windows x64 installer
        runs-on: windows-latest
        needs: version
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v6
            - name: Set version
              run: |
                  echo "${{ needs.version.outputs.version }}" > Version
                  echo '!define PRODUCT_VERSION_FROM_FILE "${{ needs.version.outputs.installer_version }}"' > Installer/version_define.nsh
            - uses: actions/setup-node@v6
              with:
                  node-version: lts/*
                  cache: npm
            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: '10.0.x'
            - name: Restore dependencies
              run: npm ci
            - name: Build web bundle
              run: npm run prod
            - name: Build Windows CEF app
              run: dotnet build Dotnet/VRCX-Cef.csproj -p:Configuration=Release -p:WarningLevel=0 -p:Platform=x64 -p:PlatformTarget=x64 -p:RestorePackagesConfig=true -t:"Restore;Clean;Build" -m -a x64 --self-contained
            - name: Install NSIS
              run: choco install nsis -y
            - name: Build installer
              uses: joncloud/makensis-action@v5.0
              with:
                  script-file: Installer/installer.nsi
                  additional-plugin-paths: Installer/Plugins
            - name: Rename installer
              run: mv Installer/VRCX_Setup.exe "VRCX_${{ needs.version.outputs.version }}_Setup.exe"
            - name: Upload Windows installer
              uses: actions/upload-artifact@v7
              with:
                  name: VRCX-Windows-x64
                  path: VRCX_${{ needs.version.outputs.version }}_Setup.exe

    build-linux:
        name: Linux AppImage x64
        runs-on: ubuntu-latest
        needs: version
        steps:
            - uses: actions/checkout@v6
            - name: Set version
              run: echo "${{ needs.version.outputs.version }}" > Version
            - uses: actions/setup-node@v6
              with:
                  node-version: lts/*
                  cache: npm
            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: '9.0.x'
            - name: Restore dependencies
              run: npm ci
            - name: Build web bundle
              run: npm run prod-linux
            - name: Build Linux .NET bridge
              run: dotnet build Dotnet/VRCX-Electron.csproj -p:Configuration=Release -p:WarningLevel=0 -p:Platform=x64 -p:PlatformTarget=x64 -p:RestorePackagesConfig=true -t:"Restore;Clean;Build" -m -a x64
            - name: Build AppImage
              run: npm run build-electron
            - name: Upload Linux AppImage
              uses: actions/upload-artifact@v7
              with:
                  name: VRCX-Linux-x64
                  path: build/VRCX_${{ needs.version.outputs.version }}_x64.AppImage

    build-macos:
        name: macOS DMG ${{ matrix.arch }}
        runs-on: macos-latest
        needs: version
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: x64
                      project: Dotnet/VRCX-Electron.csproj
                      script: build-electron
                      platform: x64
                    - arch: arm64
                      project: Dotnet/VRCX-Electron-arm64.csproj
                      script: build-electron-arm64
                      platform: arm64
        steps:
            - uses: actions/checkout@v6
            - name: Set version
              run: echo "${{ needs.version.outputs.version }}" > Version
            - uses: actions/setup-node@v6
              with:
                  node-version: lts/*
                  cache: npm
            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: '9.0.x'
            - name: Restore dependencies
              run: npm ci
            - name: Build web bundle
              run: npm run prod-linux
            - name: Build macOS .NET bridge
              run: dotnet build '${{ matrix.project }}' -p:Configuration=Release -p:WarningLevel=0 -p:Platform=${{ matrix.platform }} -p:PlatformTarget=${{ matrix.platform }} -p:RestorePackagesConfig=true -t:"Restore;Clean;Build" -m -a ${{ matrix.arch }}
            - name: Build DMG
              run: npm run ${{ matrix.script }}
            - name: Upload macOS DMG
              uses: actions/upload-artifact@v7
              with:
                  name: VRCX-macOS-${{ matrix.arch }}
                  path: build/VRCX_${{ needs.version.outputs.version }}_${{ matrix.arch }}.dmg
