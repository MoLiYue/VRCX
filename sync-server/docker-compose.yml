services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vrcx_sync}
      POSTGRES_USER: ${POSTGRES_USER:-vrcx_sync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vrcx_sync} -d ${POSTGRES_DB:-vrcx_sync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-vrcx_sync}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vrcx_sync}
      SYNC_TOKEN: ${SYNC_TOKEN:?set SYNC_TOKEN in .env}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "${SYNC_API_PORT:-8080}:8080"

volumes:
  postgres-data:
